<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332"/>
      <stop offset="100%" style="stop-color:#0f1419"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="50%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6ee7b7"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#10b981" flood-opacity="0.5"/>
    </filter>
    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  
  <!-- Outer ring glow -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#10b981" stroke-width="3" opacity="0.3"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#10b981" stroke-width="2" opacity="0.15"/>
  
  <!-- Lightning bolt with plug design -->
  <g filter="url(#shadow)">
    <!-- Main bolt shape -->
    <path d="M290 100 L200 230 L260 230 L240 300 L260 300 L220 412 L320 260 L260 260 L280 190 L320 190 Z" 
          fill="url(#bolt)" 
          stroke="url(#glow)" 
          stroke-width="4"
          stroke-linejoin="round"/>
    
    <!-- Plug prongs at bottom -->
    <rect x="235" y="380" width="16" height="40" rx="4" fill="url(#bolt)"/>
    <rect x="261" y="380" width="16" height="40" rx="4" fill="url(#bolt)"/>
  </g>
  
  <!-- Highlight reflection -->
  <path d="M280 120 L210 235 L250 235 L248 250" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="6" 
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.4"/>
</svg>
