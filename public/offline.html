<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#10b981">
  <title>Offline – BC Charge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
      color: #e8ecf2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      opacity: 0.8;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    p {
      color: #9ca3af;
      max-width: 300px;
      line-height: 1.5;
    }
    .btn {
      margin-top: 24px;
      padding: 12px 24px;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #059669;
    }
    .status {
      margin-top: 16px;
      font-size: 0.875rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="1" y1="1" x2="23" y2="23"></line>
    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
    <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
    <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
    <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
    <line x1="12" y1="20" x2="12.01" y2="20"></line>
  </svg>
  <h1>Sie sind offline</h1>
  <p>Keine Internetverbindung verfügbar. Bitte überprüfen Sie Ihre Verbindung.</p>
  <button class="btn" onclick="location.reload()">Erneut versuchen</button>
  <p class="status" id="status"></p>

  <script>
    window.addEventListener('online', () => location.reload());
    
    const status = document.getElementById('status');
    if (navigator.onLine) {
      status.textContent = 'Verbindung wird wiederhergestellt...';
      setTimeout(() => location.reload(), 1000);
    }
  </script>
</body>
</html>
